sonar.projectKey=ebidding-platform
sonar.organization=my-org
sonar.projectName=eBidding Platform
sonar.projectVersion=1.0

sonar.sources=backend/src,frontend/src
sonar.tests=backend/test,frontend/src/test

sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=backend/coverage/lcov.info

sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.spec.tsx
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx

sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=false
